<nav class="bg-[#090a0f] w-full select-none border-b border-gray-800/50">
  <!-- Top Bar Container -->
  <div class="flex items-center justify-between px-4 md:px-8 py-4">

    <!-- Left Side: Logo & Brand Name -->
    <div class="flex items-center gap-2 cursor-pointer shrink-0">
      <svg class="w-7 h-7" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 5L18 19" stroke="#3B82F6" stroke-width="4" stroke-linecap="round"/>
        <path d="M18 5L6 19" stroke="#A855F7" stroke-width="4" stroke-linecap="round"/>
      </svg>
      <span class="text-lg font-bold text-white tracking-wide">CampusXchange</span>
    </div>

    <!-- Center: Search Bar (Hidden on Mobile, Visible on Desktop) -->
    <div class="hidden md:flex items-center bg-[#161821] rounded-md px-4 py-2 w-full max-w-[450px] mx-4">
      <input
        type="text"
        placeholder="Search for anything..."
        class="bg-transparent border-none outline-none w-full text-sm text-gray-200 placeholder-gray-500"
      />
      <svg class="w-4 h-4 text-gray-500 ml-2 cursor-pointer hover:text-gray-300 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
      </svg>
    </div>

    <!-- Right Side: Navigation Links (Hidden on Mobile, Visible on Desktop) -->
    <ul class="hidden md:flex items-center gap-6 lg:gap-8 text-[13px] font-medium text-gray-300 shrink-0">
  <li><a routerLink="/" class="hover:text-white transition-colors cursor-pointer">Home</a></li>
  <li><a routerLink="/products" class="hover:text-white transition-colors cursor-pointer">Browse</a></li>
  <li><a routerLink="/login" class="hover:text-white transition-colors cursor-pointer">Log In</a></li>
  <li><a routerLink="/signup" class="bg-[#5b21b6] hover:bg-[#4c1d95] text-white px-4 py-2 rounded-md transition-colors cursor-pointer">Sign Up</a></li>
</ul>

    <!-- Mobile Menu Button (Visible on Mobile, Hidden on Desktop) -->
    <button
      class="md:hidden text-gray-300 hover:text-white focus:outline-none"
      (click)="toggleMenu()">
      <!-- Hamburger Icon (Shows when menu is closed) -->
      <svg *ngIf="!isMobileMenuOpen" class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
      </svg>
      <!-- Close 'X' Icon (Shows when menu is open) -->
      <svg *ngIf="isMobileMenuOpen" class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
      </svg>
    </button>
  </div>

  <!-- Mobile Dropdown Menu (Expands below the top bar when clicked) -->
  <div *ngIf="isMobileMenuOpen" class="md:hidden bg-[#090a0f] px-4 pb-6 pt-2">
    <!-- Mobile Search Bar -->
    <div class="flex items-center bg-[#161821] rounded-md px-4 py-2 w-full mb-4">
      <input
        type="text"
        placeholder="Search for anything..."
        class="bg-transparent border-none outline-none w-full text-sm text-gray-200 placeholder-gray-500"
      />
      <svg class="w-4 h-4 text-gray-500 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
      </svg>
    </div>

    <!-- Mobile Navigation Links -->
   <ul class="flex flex-col gap-4 text-sm font-medium text-gray-300">
  <li><a routerLink="/" (click)="toggleMenu()" class="block hover:text-white transition-colors p-2 rounded hover:bg-[#161821]">Home</a></li>
  <li><a routerLink="/products" (click)="toggleMenu()" class="block hover:text-white transition-colors p-2 rounded hover:bg-[#161821]">Browse</a></li>
  <li><a routerLink="/login" (click)="toggleMenu()" class="block hover:text-white transition-colors p-2 rounded hover:bg-[#161821]">Log In</a></li>
  <li><a routerLink="/signup" (click)="toggleMenu()" class="block hover:text-white transition-colors p-2 rounded hover:bg-[#161821] text-[#818cf8]">Sign Up</a></li>
</ul>
  </div>
</nav>
