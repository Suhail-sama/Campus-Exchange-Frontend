<div class="bg-[#090a0f] min-h-screen w-full flex items-center justify-center p-4 font-sans text-white">

  <div class="bg-[#161821] w-full max-w-md p-8 rounded-2xl shadow-2xl border border-gray-800/50">

    <!-- Logo & Header -->
    <div class="flex flex-col items-center mb-8">
      <div class="flex items-center gap-2 mb-4">
        <svg class="w-8 h-8" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 5L18 19" stroke="#3B82F6" stroke-width="4" stroke-linecap="round"/>
          <path d="M18 5L6 19" stroke="#A855F7" stroke-width="4" stroke-linecap="round"/>
        </svg>
        <span class="text-xl font-bold tracking-wide">CampusXchange</span>
      </div>
      <h2 class="text-2xl font-bold">Welcome back</h2>
      <p class="text-sm text-gray-400 mt-1">Enter your credentials to access your account</p>
    </div>

    <!-- Form -->
    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="flex flex-col gap-5">

      <!-- Email Input -->
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-1.5">Email Address</label>
        <input
          type="email"
          name="email"
          [(ngModel)]="credentials.email"
          required
          placeholder="student@university.edu"
          class="w-full bg-[#090a0f] border border-gray-700 rounded-lg px-4 py-2.5 text-sm text-gray-200 placeholder-gray-500 focus:outline-none focus:border-[#818cf8] focus:ring-1 focus:ring-[#818cf8] transition-all"
        />
      </div>

      <!-- Password Input -->
      <div>
        <div class="flex justify-between items-center mb-1.5">
          <label class="block text-sm font-medium text-gray-300">Password</label>
          <a href="#" class="text-xs text-[#818cf8] hover:text-purple-400">Forgot password?</a>
        </div>
        <input
          type="password"
          name="password"
          [(ngModel)]="credentials.password"
          required
          placeholder="••••••••"
          class="w-full bg-[#090a0f] border border-gray-700 rounded-lg px-4 py-2.5 text-sm text-gray-200 placeholder-gray-500 focus:outline-none focus:border-[#818cf8] focus:ring-1 focus:ring-[#818cf8] transition-all"
        />
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        [disabled]="!loginForm.form.valid"
        class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text-white font-semibold py-2.5 rounded-lg mt-2 transition-all disabled:opacity-50 disabled:cursor-not-allowed">
        Sign In
      </button>

    </form>

    <!-- Footer -->
    <p class="text-center text-sm text-gray-400 mt-6">
      Don't have an account? <a href="/signup" class="text-[#818cf8] hover:text-purple-400 font-medium">Sign up</a>
    </p>

  </div>
</div>
